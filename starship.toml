add_newline = true

format = "$username$hostname$directory$git_branch$git_status$line_break$character"

[username]
show_always = true
format = "$user"

[hostname]
ssh_only = false
format = "[@DasMacbookPro]($style) "

[directory]
truncation_length = 3
truncate_to_repo = false
format = "$path "

[git_branch]
format = "on [$branch]($style) "

[git_status]
format = '([$all_status$ahead_behind]($style) )'


[character]
success_symbol = "❯"
error_symbol = "❯"
