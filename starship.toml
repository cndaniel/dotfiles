add_newline = true
palette = "tokyonight"

format = """
$username$hostname$directory$git_branch$git_status$python$nodejs$ruby$cmd_duration$line_break$character"""

# Tokyo Night — matches the tmux status bar. Keys named after standard colors
# (blue/cyan/green/red) override them, so existing styles pick up these hexes.
[palettes.tokyonight]
blue = "#7aa2f7"
cyan = "#7dcfff"
green = "#9ece6a"
red = "#f7768e"
orange = "#e0af68"
purple = "#bb9af7"

[username]
show_always = true
format = "[$user](bold cyan)"

[hostname]
ssh_only = false
format = "[@$hostname](cyan) "

[directory]
truncation_length = 3
truncate_to_repo = false
format = "[$path](bold blue) "

[git_branch]
format = "on [$branch](bold green) "

[git_status]
format = '([$staged$modified$untracked$deleted$ahead_behind](orange)) '
staged = '✚ '
modified = '● '
untracked = '+ '
deleted = '✖ '
ahead = '⇡${count} '
behind = '⇣${count} '
diverged = '⇡${ahead_count} ⇣${behind_count} '

[character]
success_symbol = "[❯](bold green)"
error_symbol = "[❯](bold red)"

[cmd_duration]
min_time = 3_000
format = "took [$duration](bold orange) "

[nodejs]
format = "[$symbol$version](green) "
detect_files = ["package.json"]
symbol = " "

[python]
format = "[$symbol$version](orange) "
detect_files = ["requirements.txt", "pyproject.toml", "setup.py", "Pipfile"]
detect_folders = [".venv", "venv"]
symbol = " "

[ruby]
format = "[$symbol$version](red) "
detect_files = ["Gemfile", ".ruby-version"]
symbol = " "

[docker_context]
format = "[$symbol$context](blue) "
symbol = " "
only_with_files = true
