set -g default-terminal "tmux-256color"
set -g terminal-overrides ",*:RGB"
set -g terminal-features "xterm-256color:hyperlinks,xterm-ghostty:RGB:hyperlinks,tmux-256color:RGB"
set -s set-clipboard on

setw -g mode-keys vi
set -g status-keys emacs
set -g mouse on
set -g focus-events on
set -g allow-passthrough on
set -g display-time 2000
set -g display-panes-time 2000

set -g prefix C-a
bind-key C-a send-prefix

bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R
bind-key -r C-h select-window -t :-
bind-key -r C-l select-window -t :+

set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

set -g history-limit 50000

set -g status-interval 5
set -g status-style bg="#1a1b26",fg="#a9b1d6"
set -g status-left-length 60
set -g status-right-length 60
set -g status-left "#[fg=#1a1b26,bg=#{?client_prefix,#e0af68,#7aa2f7},bold] #{?client_prefix,⌨ ,}#S #[fg=#{?client_prefix,#e0af68,#7aa2f7},bg=#1a1b26]#[default] "
set -g status-right "#[fg=#3b4261,bg=#1a1b26]#[fg=#a9b1d6,bg=#3b4261]  %m-%d #[fg=#7aa2f7,bg=#3b4261]#[fg=#1a1b26,bg=#7aa2f7,bold]  %H:%M #[default]"
setw -g window-status-format "#[fg=#565f89,bg=#1a1b26] #I #(~/dotfiles/bin/tmux-pane-title '#{pane_tty}' '#{pane_current_command}' '#{pane_current_path}') "
setw -g window-status-current-format "#[fg=#1a1b26,bg=#7aa2f7]#[fg=#1a1b26,bg=#7aa2f7,bold] #I #(~/dotfiles/bin/tmux-pane-title '#{pane_tty}' '#{pane_current_command}' '#{pane_current_path}') #[fg=#7aa2f7,bg=#1a1b26]#[default]"
setw -g window-status-separator ""
setw -g window-status-bell-style "fg=#e0af68,bg=#1a1b26,bold"
set -g pane-border-style fg="#3b4261"
set -g pane-active-border-style fg="#7aa2f7"
set -g message-style bg="#3b4261",fg="#c0caf5"
set -g mode-style bg="#283457",fg="#c0caf5"

bind-key r source-file ~/.tmux.conf \; display-message "~/.tmux.conf reloaded"

bind-key '-' split-window -v -c "#{pane_current_path}"
bind-key \\ split-window -h -c "#{pane_current_path}"
bind-key '|' split-window -v -c "#{pane_current_path}"
bind-key c new-window -c "#{pane_current_path}"

bind -n S-Left resize-pane -L 2
bind -n S-Right resize-pane -R 2
bind -n S-Down resize-pane -D 1
bind -n S-Up resize-pane -U 1
bind -n C-Left resize-pane -L 10
bind -n C-Right resize-pane -R 10
bind -n C-Down resize-pane -D 5
bind -n C-Up resize-pane -U 5

bind-key g display-popup -E -w 80% -h 80% -d "#{pane_current_path}"
bind-key G display-popup -E -w 90% -h 90% -d "#{pane_current_path}" lazygit
# Reveal the selected text (a path) in Finder: drag-select a path, then prefix+o.
# File -> reveal & select; directory -> open. Relative paths resolve against the pane cwd.
bind-key o run-shell "~/dotfiles/bin/reveal-in-finder '#{pane_current_path}'"
bind-key b break-pane -d
bind-key V select-layout even-vertical
bind-key H select-layout even-horizontal
bind-key m if -F '#{mouse}' 'set -g mouse off \; display-message "Mouse off: terminal native selection enabled"' 'set -g mouse on \; display-message "Mouse on: tmux mouse copy enabled"'
bind-key s display-panes \; command-prompt -p "pane #: " "swap-pane -t '%%'"
bind-key C-l list-sessions
bind-key C-j choose-tree

bind -n WheelUpPane if -F "#{mouse_any_flag}" "send-keys -M" "if -F '#{pane_in_mode}' 'send-keys -M' 'copy-mode -e'"
bind -n MouseDrag1Pane if -F "#{pane_in_mode}" "send-keys -M" "copy-mode -M"
bind -T copy-mode-vi MouseDragEnd1Pane send -X copy-pipe-and-cancel 'pbcopy'
bind -n DoubleClick1Pane select-pane \; copy-mode -H \; send -X select-word \; send -X copy-pipe-no-clear 'pbcopy'
bind -n TripleClick1Pane select-pane \; copy-mode -H \; send -X select-line \; send -X copy-pipe-no-clear 'pbcopy'
bind-key -T copy-mode-vi v send -X begin-selection
bind-key -T copy-mode-vi y send -X copy-pipe-and-cancel 'pbcopy'
unbind -T copy-mode-vi Enter
bind-key -T copy-mode-vi Enter send -X copy-pipe-and-cancel 'pbcopy'

is_vim="ps -o state= -o comm= -t '#{pane_tty}' | grep -iqE '^[^TXZ ]+(\\S+/)?g?(view|n?vim?x?)(diff)?$'"
bind-key -n C-h if-shell "$is_vim" "send-keys C-h" "select-pane -L"
bind-key -n C-j if-shell "$is_vim" "send-keys C-j" "select-pane -D"
bind-key -n C-k if-shell "$is_vim" "send-keys C-k" "select-pane -U"
bind-key -n C-l if-shell "$is_vim" "send-keys C-l" "select-pane -R"
bind -n C-\\ if-shell "$is_vim" "send-keys 'C-\\'" "select-pane -l"

bind-key -T copy-mode-vi C-h select-pane -L
bind-key -T copy-mode-vi C-j select-pane -D
bind-key -T copy-mode-vi C-k select-pane -U
bind-key -T copy-mode-vi C-l select-pane -R

unbind-key C-z
bind-key K confirm-before -p "Kill session #S? (y/n)" "run-shell 'tmux switch-client -n 2>/dev/null; tmux kill-session -t \"#S\"'"
bind-key T run-shell "command -v tat >/dev/null 2>&1 && tat || true"

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @resurrect-capture-pane-contents 'on'
set -g @resurrect-strategy-vim 'session'
set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'

if-shell "[ -f ~/.tmux/plugins/tpm/tpm ]" "run '~/.tmux/plugins/tpm/tpm'"
if-shell "[ -f ~/.tmux.conf.private ]" "source ~/.tmux.conf.private"
